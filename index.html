<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom right, #4b79a1, #283e51);
            color: white;
            text-align: center;
            padding: 100px;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 40px;
            width: 400px;
            margin: auto;
            backdrop-filter: blur(5px);
        }

        h1 { font-size: 2.5rem; }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #00c6ff;
            color: #000;
            transition: 0.2s;
        }

        button:hover {
            background: #0075a8;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Office Supply Ordering Portal</h1>
        <p>Your one-stop center for company office supply requests.</p>
        <button onclick="window.location.href='login.html'">Log In</button>
    </div>
</body>
</html>
