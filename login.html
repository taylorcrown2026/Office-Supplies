<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In • Office Supply</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="nav" aria-label="Primary">
    <div class="inner">
      <div class="brand">Concentra • Office Supply</div>
      <div style="margin-left:auto; display:flex; gap:16px">
        <a href="index.html">Home</a>
        <a href="login.html" aria-current="page">Log In</a>
      </div>
    </div>
  </nav>

  <main class="container section" style="display:grid; place-items:center;">
    <div class="card pad" style="width:min(480px, 92vw)">
      <h2 style="margin:0 0 6px">Log In</h2>
      <p class="muted small" style="margin:0 0 16px">Use your company credentials to continue.</p>
      <form method="POST" action="/login" novalidate>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
        <div class="form-actions">
          <button class="btn primary" type="submit">Log In</button>
        </div>
        <p class="muted small" style="margin-top:10px">Admin (demo): <code>admin / admin123</code></p>
      </form>
    </div>
  </main>
</body>
</html>
