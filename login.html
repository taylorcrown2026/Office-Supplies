<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Office Supply Portal</title>
    <style>
        body {
            font-family: Arial;
            background: #e8e8e8;
            padding-top: 80px;
            text-align: center;
        }

        .login-box {
            background: white;
            padding: 30px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #aaa;
        }

        button {
            padding: 12px 20px;
            width: 95%;
            background: #0b78e3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Log In</h2>
    <form method="POST" action="/login">
        <input type="text" name="username" placeholder="Username" required /><br>
        <input type="password" name="password" placeholder="Password" required /><br>
        <button type="submit">Log In</button>
    </form>
</div>

</body>
</html>
