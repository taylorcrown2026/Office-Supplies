<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — HR Hub</title>

  <script src="config.js"></script>
  <script src="auth.js"></script>

  <style>
    body { font-family: system-ui; padding: 40px; }
    .card { max-width: 420px; margin: auto; padding: 20px; background: #fff; border-radius: 10px; }
    .error { color: #b91c1c; margin-top: 10px; }
    .success { color: #065f46; margin-top: 10px; }
  </style>
</head>

<body>

<div class="card">
  <h2>Sign in</h2>

  <form id="loginForm">
    <label>Username</label>
    <input id="username" required>

    <label>Password</label>
    <input id="password" type="password" required>

    <button type="submit">Login</button>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
  </form>
</div>

<script>
async function handleLogin(e) {
  e.preventDefault();
  const user = username.value.trim();
  const pass = password.value;
  error.textContent = "";
  success.textContent = "";

  try {
    await Auth.login(user, pass);
    success.textContent = "Login successful — redirecting…";
    const returnTo = new URLSearchParams(location.search).get("returnTo") || "index.html";
    setTimeout(() => (location.href = returnTo), 500);
  } catch (err) {
    error.textContent = err.message;
  }
}

loginForm.addEventListener("submit", handleLogin);
</script>

</body>
</html>
