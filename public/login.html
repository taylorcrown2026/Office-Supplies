<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="/config.js"></script>
  <script src="/auth.js"></script>
  <style>
    body{font:16px/1.5 system-ui,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f7f7f7;color:#1a1a1a}
    main{max-width:420px;margin:12vh auto;background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:24px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    h1{margin:0 0 12px}
    label{display:block;font-weight:600;margin-top:12px}
    input{width:100%;padding:10px;border:1px solid #d0d7de;border-radius:8px}
    button{margin-top:16px;width:100%;padding:12px;border:0;border-radius:8px;background:#0f6cbd;color:#fff;font-weight:700;cursor:pointer}
    .err{color:#b91c1c;margin-top:10px;min-height:20px}
  </style>
</head>
<body>
  <main>
    <h1>Sign in</h1>
    <p>Use your credentials to continue.</p>
    <form id="loginForm">
      <label for="username">Username</label>
      <input id="username" autocomplete="username" required />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required />
      <button type="submit">Login</button>
      <div class="err" id="error"></div>
    </form>
  </main>
  <script>(async function(){
  function normalizeReturn(goBack){
    if(!goBack) return null;
    // Absolute URL? just use it.
    if(/^https?:\/\//i.test(goBack)) return goBack;
    // Ensure it starts with base() + '/'
    var b = (window.__BASE_PATH__ || '');
    if(goBack.startsWith(b)) return goBack;
    if(goBack.startsWith('/')) return b + goBack;
    return b + '/' + goBack;
  }

  const params = new URLSearchParams(location.search);
  const rawReturn = params.get('return');
  const goBack = normalizeReturn(rawReturn);
  const s = await Auth.session();
  if (s.authenticated) { if (goBack) location.href = goBack; else Auth.redirectAfterLogin(s.user); return; }
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value;
    const out = document.getElementById("error");
    out.textContent = "";
    try {
      const user = await Auth.login(u, p);
      if (goBack) location.href = goBack; else Auth.redirectAfterLogin(user);
    } catch(err) {
      out.textContent = "Invalid username or password.";
    }
  });
})();</script>
</body>
</html>
