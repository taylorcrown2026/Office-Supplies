<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Upload Invoices</title>
  <script src="/config.js"></script>
  <script src="/auth.js"></script>
  <style>
    :root{--brand:#0f6cbd;--ink:#1a1a1a;--muted:#666;--bg:#f7f7f7;--card:#fff;--danger:#b91c1c}
    *{box-sizing:border-box}
    body{margin:0;font:16px/1.5 system-ui,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg)}
    header{background:#fff;border-bottom:1px solid #e5e5e5}
    nav{max-width:980px;margin:0 auto;padding:12px 16px;display:flex;gap:12px;align-items:center;justify-content:space-between}
    nav .left, nav .right{display:flex;gap:12px;align-items:center}
    a{color:var(--brand);text-decoration:none}
    main{max-width:980px;margin:24px auto;padding:0 16px}
    .card{background:var(--card);border:1px solid #e5e5e5;border-radius:10px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
    .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid #d0d7de;background:#fff;color:var(--ink);padding:10px 14px;border-radius:8px;cursor:pointer}
    .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  </style>
</head>
<body>
<header>
  <nav>
    <div class="left">
      <a href="index.html">Home</a> · <span>Upload Invoices</span>
    </div>
    <div class="right">
      <button class="btn" data-logout>Logout</button>
    </div>
  </nav>
</header>

<main>
  <h1>Upload Invoices</h1>
  <div class="card">
    <form id="invoiceForm" novalidate>
      <div class="row">
        <label for="name">Your name *</label>
        <input id="name" type="text" required />
      </div>
      <div class="row">
        <label for="vendor">Vendor *</label>
        <input id="vendor" type="text" required />
      </div>
      <div class="row">
        <label for="dept">Department *</label>
        <select id="dept" required>
          <option value="" selected disabled>Select your department</option>
          <option>HR Services (Deidre Debruin)</option>
          <option>HR Leadership (Danielle Kendall)</option>
          <option>Internal Communications & Knowledge Management (Michelle Tandoc)</option>
          <option>Learning & Leadership Development (Amy Kidder)</option>
          <option>Payroll & Benefits (Pamela Ashworth)</option>
          <option>Talent Acquisition (Samantha Oakley)</option>
        </select>
      </div>
      <div class="row">
        <label for="file">Invoice file *</label>
        <input id="file" name="file" type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg" required />
      </div>
      <div class="actions" style="margin-top:12px">
        <button type="submit" class="btn primary">Submit</button>
        <button type="reset" class="btn">Reset</button>
        <a class="btn" href="index.html">Home</a>
      </div>
    </form>
  </div>
</main>

<script>
  (async function(){
    if(!await Auth.ensureAuthenticated()) return;
    Auth.bindLogoutButtons();

    document.getElementById('invoiceForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const vendor = document.getElementById('vendor').value.trim();
      const dept = document.getElementById('dept').value.trim();
      const fileInput = document.getElementById('file');
      if(!name || !vendor || !dept || !fileInput.files.length){ alert('Please complete all required fields.'); return; }

      // 1) Upload file
      const fd = new FormData();
      fd.append('file', fileInput.files[0]);
      let uploaded;
      try{
        const r = await fetch('/upload', { method:'POST', body: fd, credentials:'same-origin' });
        const j = await r.json();
        if(!r.ok || !j.ok) throw new Error('Upload failed');
        uploaded = j.file; // {name,size}
      }catch(err){ alert('Upload failed. Please try again.'); return; }

      // 2) Record submission
      try{
        await fetch('/api/invoices', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ name, vendor, dept, file: uploaded.name })
        });
      }catch(err){ /* non-fatal */ }

      // 3) Open Outlook email
      const to = 'tcrownover@concentra.com';
      const subject = `Invoice Submission - ${vendor} - ${dept} - ${name}`;
      const EOL = '\r\n';
      let body = '';
      body += `Requestor: ${name}${EOL}`;
      body += `Vendor: ${vendor}${EOL}`;
      body += `Department: ${dept}${EOL}`;
      body += `${EOL}Uploaded file:${EOL}${uploaded.name} (${(uploaded.size/1024).toFixed(1)} KB)${EOL}`;
      body += `${EOL}Submitted from: ${location.href}${EOL}`;
      body += `Submitted at: ${new Date().toLocaleString()}${EOL}`;
      const mailto = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      try{ window.location.href = mailto; }catch(err){ window.open(mailto, '_self'); }
      setTimeout(()=>{ (e.target).reset(); alert('Your Outlook/new mail window should now be open with details prefilled.'); }, 150);
    });
  })();
</script>
</body>
</html>
