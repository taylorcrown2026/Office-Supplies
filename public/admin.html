<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="/config.js"></script>
  <script src="/auth.js"></script>
  <style>
    :root{--brand:#0f6cbd;--ink:#1a1a1a;--muted:#666;--bg:#f7f7f7;--card:#fff}
    *{box-sizing:border-box}
    body{margin:0;font:16px/1.5 system-ui,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg)}
    header{background:#fff;border-bottom:1px solid #e5e5e5}
    nav{max-width:1100px;margin:0 auto;padding:12px 16px;display:flex;gap:12px;align-items:center;justify-content:space-between}
    nav .left, nav .right{display:flex;gap:12px;align-items:center}
    a{color:var(--brand);text-decoration:none}
    main{max-width:1100px;margin:24px auto;padding:0 16px}
    .card{background:var(--card);border:1px solid #e5e5e5;border-radius:10px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.03);margin-bottom:24px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid #eee;text-align:left;vertical-align:top}
    th{background:#fafafa;font-weight:700}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px}
    .done{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
    .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid #d0d7de;background:#fff;color:var(--ink);padding:8px 12px;border-radius:8px;cursor:pointer}
  </style>
</head>
<body>
<header>
  <nav>
    <div class="left">
      <a href="index.html">Home</a> • <span>Admin</span>
    </div>
    <div class="right">
      <button class="btn" data-logout>Logout</button>
    </div>
  </nav>
</header>
<main>
  <div class="card">
    <h2>Invoices</h2>
    <table id="tblInvoices" aria-label="Invoices">
      <thead>
        <tr>
          <th>Submitted</th><th>Requestor</th><th>Vendor</th><th>Department</th><th>File</th><th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="card">
    <h2>Supply Orders</h2>
    <table id="tblSupplies" aria-label="Supplies">
      <thead>
        <tr>
          <th>Submitted</th><th>Requestor</th><th>Department</th><th>Items</th><th>Urgent</th><th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</main>
<script>
  (async function(){
    const sess = await Auth.session();
    if(!sess.authenticated){ location.href = "login.html?return=" + encodeURIComponent('/admin.html'); return; }
    if(sess.user?.role !== 'admin'){ alert('Admins only'); location.href = "index.html"; return; }
    Auth.bindLogoutButtons();

    async function fetchJSON(url){ const r = await fetch(url, { credentials:'same-origin' }); if(!r.ok) throw new Error('Failed'); return r.json(); }
    function fmtDate(s){ try{ return new Date(s).toLocaleString(); }catch{ return s; } }
    function renderInvoices(rows){
      const tb = document.querySelector('#tblInvoices tbody'); tb.innerHTML = '';
      rows.sort((a,b)=> new Date(b.submittedAt)-new Date(a.submittedAt));
      for(const it of rows){
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${fmtDate(it.submittedAt)}</td>
          <td>${it.name || ''}</td>
          <td>${it.vendor || ''}</td>
          <td>${it.dept || ''}</td>
          <td>${it.file ? it.file : ''}</td>
          <td>
            ${it.completed ? `<span class="badge done">Completed</span>` : `<button class="btn" data-complete-inv="${it.id}">Mark completed</button>`}
          </td>`;
        tb.appendChild(tr);
      }
    }
    function renderSupplies(rows){
      const tb = document.querySelector('#tblSupplies tbody'); tb.innerHTML = '';
      rows.sort((a,b)=> new Date(b.submittedAt)-new Date(a.submittedAt));
      for(const it of rows){
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${fmtDate(it.submittedAt)}</td>
          <td>${it.name || ''}</td>
          <td>${it.dept || ''}</td>
          <td>${Array.isArray(it.items)? it.items.join(', ') : ''}</td>
          <td>${it.urgent || 'No'}</td>
          <td>
            ${it.completed ? `<span class="badge done">Completed</span>` : `<button class="btn" data-complete-sup="${it.id}">Mark completed</button>`}
          </td>`;
        tb.appendChild(tr);
      }
    }
    async function loadAll(){
      const [invoices, supplies] = await Promise.all([
        fetchJSON('/api/admin/invoices'),
        fetchJSON('/api/admin/supplies')
      ]);
      renderInvoices(invoices); renderSupplies(supplies);
    }
    document.addEventListener('click', async (e)=>{
      const invId = e.target.getAttribute && e.target.getAttribute('data-complete-inv');
      const supId = e.target.getAttribute && e.target.getAttribute('data-complete-sup');
      try{
        if(invId){ await fetch(`/api/admin/invoices/${invId}/complete`, { method:'POST' }); await loadAll(); }
        else if(supId){ await fetch(`/api/admin/supplies/${supId}/complete`, { method:'POST' }); await loadAll(); }
      }catch(err){ alert('Action failed. Try again.'); }
    });
    loadAll();
  })();
</script>
</body>
</html>
