<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1" />
 <title>Order Office Supplies</title>
 <style>
 :root{--brand:#0f6cbd;--ink:#1a1a1a;--muted:#666;--bg:#f7f7f7;--card:#fff;--danger:#b91c1c}
 *{box-sizing:border-box}
 body{margin:0;font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg)}
 header{background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:10}
 nav{max-width:980px;margin:0 auto;padding:12px 16px;display:flex;gap:12px;align-items:center;justify-content:space-between}
 nav .left, nav .right{display:flex;gap:12px;align-items:center}
 a{color:var(--brand);text-decoration:none}
 a:hover{text-decoration:underline}
 main{max-width:980px;margin:24px auto;padding:0 16px}
 .card{background:var(--card);border:1px solid #e5e5e5;border-radius:10px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
 form .row{display:grid;grid-template-columns:1fr 2fr;gap:12px;align-items:center;margin:10px 0}
 label{font-weight:600}
 input[type=text], input[type=url], input[type=date], select, textarea{width:100%;padding:10px;border:1px solid #d0d7de;border-radius:8px;background:#fff}
 textarea{min-height:90px}
 fieldset{border:1px solid #e5e5e5;border-radius:8px;padding:12px;margin:8px 0}
 legend{font-weight:700;padding:0 6px}
 .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px 12px;margin:8px 0}
 .grid label{font-weight:400}
 .actions{display:flex;gap:12px;margin-top:16px}
 .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid #d0d7de;background:#fff;color:var(--ink);padding:10px 14px;border-radius:8px;cursor:pointer}
 .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
 .note{background:#fff6db;border:1px solid #fde68a;color:#8a6d00;padding:8px 10px;border-radius:8px}
 small.hint{color:var(--muted);display:block;margin-top:6px}
 @media (max-width:720px){ form .row{grid-template-columns:1fr} }
 </style>
</head>
<body>
 <header>
  <nav>
   <div class="left">
    <a href="index.html">Home</a>
    <strong>•</strong>
    <span>Order Supplies</span>
   </div>
   <div class="right">
    <a id="authCta" href="login.html" data-public>Sign in</a>
   </div>
  </nav>
 </header>
 <main>
  <h1>Order Office Supplies</h1>
  <p class="lead">Submit this form and your mail app will open a ready‑to‑send email to <strong>tcrownover@concentra.com</strong>.</p>
  <div class="card">
   <form id="supplyForm" novalidate>
    <div class="row">
     <label for="dept">Department <span aria-hidden="true" style="color:var(--danger)">*</span></label>
     <select id="dept" required>
      <option value="" selected disabled>Select your department</option>
      <option>HR Services (Deidre Debruin)</option>
      <option>HR Leadership (Danielle Kendall)</option>
      <option>Internal Communications & Knowledge Management (Michelle Tandoc)</option>
      <option>Learning & Leadership Development (Amy Kidder)</option>
      <option>Payroll & Benefits (Pamela Ashworth)</option>
      <option>Talent Acquisition (Samantha Oakley)</option>
     </select>
    </div>
    <div class="row">
     <label for="name">Your name <span aria-hidden="true" style="color:var(--danger)">*</span></label>
     <input id="name" type="text" autocomplete="name" placeholder="First Last" required />
    </div>
    <fieldset>
     <legend>Supplies needed</legend>
     <div class="grid" id="itemsGrid">
      <label><input type="checkbox" name="item" value="Pens" /> Pens</label>
      <label><input type="checkbox" name="item" value="Pencils" /> Pencils</label>
      <label><input type="checkbox" name="item" value="Highlighters" /> Highlighters</label>
      <label><input type="checkbox" name="item" value="Sticky notes" /> Sticky notes</label>
      <label><input type="checkbox" name="item" value="Notepads" /> Notepads</label>
      <label><input type="checkbox" name="item" value="Printer paper (ream)" /> Printer paper (ream)</label>
      <label><input type="checkbox" name="item" value="File folders" /> File folders</label>
      <label><input type="checkbox" name="item" value="3‑ring binders" /> 3‑ring binders</label>
      <label><input type="checkbox" name="item" value="Staples" /> Staples</label>
      <label><input type="checkbox" name="item" value="Stapler" /> Stapler</label>
      <label><input type="checkbox" name="item" value="Paper clips" /> Paper clips</label>
      <label><input type="checkbox" name="item" value="Binder clips" /> Binder clips</label>
      <label><input type="checkbox" name="item" value="Tape" /> Tape</label>
      <label><input type="checkbox" name="item" value="Tape dispenser" /> Tape dispenser</label>
      <label><input type="checkbox" name="item" value="Scissors" /> Scissors</label>
      <label><input type="checkbox" name="item" value="Dry erase markers" /> Dry erase markers</label>
      <label><input type="checkbox" name="item" value="Whiteboard eraser" /> Whiteboard eraser</label>
      <label><input type="checkbox" name="item" value="Desk organizer" /> Desk organizer</label>
      <label><input type="checkbox" name="item" value="AA batteries" /> AA batteries</label>
      <label><input type="checkbox" name="item" value="AAA batteries" /> AAA batteries</label>
      <label><input type="checkbox" name="item" value="Mouse" /> Mouse</label>
      <label><input type="checkbox" name="item" value="Keyboard" /> Keyboard</label>
      <label><input type="checkbox" name="item" value="Mouse pad" /> Mouse pad</label>
      <label><input type="checkbox" name="item" value="Monitor stand" /> Monitor stand</label>
      <label><input type="checkbox" name="item" value="HDMI cable" /> HDMI cable</label>
      <label><input type="checkbox" name="item" value="USB‑C hub" /> USB‑C hub</label>
      <label><input type="checkbox" name="item" value="Label maker tape" /> Label maker tape</label>
     </div>
     <div class="row">
      <label for="other">Other items</label>
      <textarea id="other" placeholder="List anything not shown above (one item per line if multiple)"></textarea>
     </div>
     <div class="row">
      <label for="notes">Quantity / notes (optional)</label>
      <textarea id="notes" placeholder="e.g., 2 packs of pens, blue ink only"></textarea>
     </div>
     <div class="row">
      <label for="link">Product link (optional)</label>
      <input id="link" type="url" inputmode="url" placeholder="https://example.com/product" />
     </div>
    </fieldset>
    <div class="row">
     <label for="delivery">Delivery by <span aria-hidden="true" style="color:var(--danger)">*</span></label>
     <div>
      <input id="delivery" type="date" required />
      <small id="deliveryHint" class="hint"></small>
      <div class="note" id="deliveryNote" style="display:none;margin-top:8px"></div>
     </div>
    </div>
    <fieldset>
     <legend>Is this urgent?</legend>
     <div class="grid" style="grid-template-columns:repeat(2, minmax(120px, 1fr))">
      <label><input type="radio" name="urgent" value="No" checked /> No</label>
      <label><input type="radio" name="urgent" value="Yes" /> Yes</label>
     </div>
    </fieldset>
    <div class="actions">
     <button type="submit" class="btn primary">Submit request</button>
     <button type="reset" class="btn">Reset</button>
     <a class="btn" href="index.html">Home</a>
    </div>
   </form>
  </div>
 </main>
 <script src="config.js"></script>
 <script src="auth.js"></script>
 <script>
 (function(){
  function addBusinessDays(fromDate, days){
    const d = new Date(fromDate.getFullYear(), fromDate.getMonth(), fromDate.getDate());
    let added = 0; while(added < days){ d.setDate(d.getDate()+1); const wd=d.getDay(); if(wd!==0 && wd!==6) added++; }
    return d;
  }
  function formatYMD(date){ const y=date.getFullYear(); const m=String(date.getMonth()+1).padStart(2,'0'); const da=String(date.getDate()).padStart(2,'0'); return `${y}-${m}-${da}`; }
  document.addEventListener('DOMContentLoaded', async function(){
    if(!await Auth.ensureAuthenticated()) return;
    const delivery = document.getElementById('delivery');
    const hint = document.getElementById('deliveryHint');
    const note = document.getElementById('deliveryNote');
    const earliest = addBusinessDays(new Date(), 3);
    const minDateStr = formatYMD(earliest);
    delivery.min = minDateStr; delivery.value = minDateStr;
    hint.textContent = 'Earliest recommended date (min 3 business days): ' + earliest.toLocaleDateString();
    delivery.addEventListener('change', () => {
      if(delivery.value && delivery.value < minDateStr){
        note.style.display = 'block';
        note.textContent = 'Please choose ' + earliest.toLocaleDateString() + ' or later to allow at least 3 business days.';
      }else{ note.style.display = 'none'; note.textContent = ''; }
    });
    document.getElementById('supplyForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const dept = document.getElementById('dept').value.trim();
      const name = document.getElementById('name').value.trim();
      const items = Array.from(document.querySelectorAll('input[name="item"]:checked')).map(i=>i.value);
      const other = document.getElementById('other').value.trim();
      const notes = document.getElementById('notes').value.trim();
      const link = document.getElementById('link').value.trim();
      const urgent = (document.querySelector('input[name="urgent"]:checked')||{}).value || 'No';
      const deliveryVal = document.getElementById('delivery').value;
      if(!dept){ alert('Please select your department.'); return; }
      if(!name){ alert('Please enter your name.'); return; }
      if(items.length === 0 && !other){ alert('Select at least one supply or add details in "Other items".'); return; }
      if(!deliveryVal){ alert('Please choose a delivery by date.'); return; }
      if(deliveryVal < delivery.min){ alert('Please choose ' + new Date(delivery.min).toLocaleDateString() + ' or later for delivery.'); return; }
      if(link && !/^https?:\/\//i.test(link)){ alert('Please enter a valid http(s) URL for the product link.'); return; }

      // 1) Record supply submission (JSON storage)
      try{
        await fetch('/api/supplies', {
          method: 'POST', headers: { 'Content-Type':'application/json' },
          body: JSON.stringify({ dept, name, items, other, notes, link, urgent, delivery: deliveryVal })
        });
      }catch(err){ /* non-fatal for user */ }

      // 2) Open Outlook email
      const to = 'tcrownover@concentra.com';
      const subject = `Office Supplies Request - ${dept} - ${name} - ${deliveryVal}`;
      const EOL = '\r\n';
      let body = '';
      body += `Department: ${dept}${EOL}`;
      body += `Requestor: ${name}${EOL}`;
      body += `Urgent: ${urgent}${EOL}`;
      body += `Delivery by: ${new Date(deliveryVal).toLocaleDateString()}${EOL}`;
      body += `${EOL}Selected items:${EOL}`;
      body += items.length ? ('- ' + items.join(`${EOL}- `) + EOL) : `(none)${EOL}`;
      if(other) body += `${EOL}Other items:${EOL}${other}${EOL}`;
      if(notes) body += `${EOL}Quantity / notes:${EOL}${notes}${EOL}`;
      if(link) body += `${EOL}Product link: ${link}${EOL}`;
      body += `${EOL}Submitted from: ${location.href}${EOL}`;
      body += `Submitted at: ${new Date().toLocaleString()}${EOL}`;
      const mailto = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      try{ window.location.href = mailto; }catch(err){ window.open(mailto, '_self'); }
      setTimeout(()=>{ (e.target).reset(); delivery.value = delivery.min; alert('Your Outlook/new mail window should now be open with details prefilled.'); }, 150);
    });
  });
 })();
 </script>
</body>
</html>
