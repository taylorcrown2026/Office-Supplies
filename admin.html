<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin • Office Supply</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="nav" aria-label="Primary">
    <div class="inner">
      <div class="brand">Concentra • Office Supply</div>
      <div style="margin-left:auto; display:flex; gap:16px">
        <a href="index.html">Home</a>
      </div>
    </div>
  </nav>

  <main class="container section">
    <section class="card pad" style="margin-bottom:20px">
      <h2 style="margin:0 0 6px">Pending Requests</h2>
      <p class="muted small" style="margin:0 0 16px">Review incoming requests and mark completed when fulfilled.</p>
      <div class="table-wrap">
        <table id="requestsTable" aria-describedby="requests-help">
          <thead>
            <tr>
              <th>User</th>
              <th>Department</th>
              <th>Item(s)</th>
              <th>Needed By</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div id="requests-help" class="small muted">Only open requests are listed.</div>
      </div>
    </section>

    <section class="card pad">
      <h2 style="margin:0 0 6px">Create New User</h2>
      <p class="muted small" style="margin:0 0 16px">Demo-only user creation. Replace with real provisioning and password hashing.</p>
      <form id="newUserForm" class="grid cols-2">
        <div>
          <label for="newUsername">Username</label>
          <input type="text" id="newUsername" required />
        </div>
        <div>
          <label for="newPassword">Password</label>
          <input type="password" id="newPassword" required />
        </div>
        <div class="form-actions" style="grid-column:1/-1">
          <button class="btn primary" type="submit">Add User</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    async function loadRequests(){
      const res = await fetch('/requests');
      if(!res.ok){
        const msg = await res.text();
        alert(msg || 'Failed to load requests');
        return;
      }
      const data = await res.json();
      const tbody = document.querySelector('#requestsTable tbody');
      tbody.innerHTML = '';
      data.forEach(req=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${'{'}req.user{'}'}</td>
          <td>${'{'}req.department{'}'}</td>
          <td>${'{'}req.item{'}'}</td>
          <td>${'{'}req.date{'}'}</td>
          <td><button class="btn" data-id="${'{'}req.id{'}'}">Mark Completed</button></td>
        `;
        tbody.appendChild(tr);
      });

      tbody.addEventListener('click', async (e)=>{
        const btn = e.target.closest('button[data-id]');
        if(!btn) return;
        const id = btn.getAttribute('data-id');
        const res = await fetch(`/requests/${'{'}id{'}'}`, { method:'PUT' });
        if(res.ok) loadRequests();
      });
    }

    loadRequests();

    document.getElementById('newUserForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const payload = {
        username: document.getElementById('newUsername').value,
        password: document.getElementById('newPassword').value
      };
      const res = await fetch('/createUser', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
      });
      if(res.ok){ alert('User created (demo)'); e.target.reset(); }
    });
  </script>
</body>
</html>
