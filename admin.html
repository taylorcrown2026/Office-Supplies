<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Office Supply Portal</title>

    <style>
        body { font-family: Arial; background: #f2f2f2; padding: 20px; }
        h1 { text-align: center; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
        }

        table, th, td {
            border: 1px solid gray;
        }

        th, td {
            padding: 12px;
            background: white;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
        }

        .complete-btn { background: #28a745; color: white; }
        .add-user { background: #0069d9; color: white; }

        .user-form {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input { width: 90%; padding: 10px; margin: 8px 0; }
    </style>

</head>
<body>

<h1>Admin Dashboard</h1>

<h2>Pending Office Supply Requests</h2>
<table id="requestsTable">
    <tr>
        <th>User</th>
        <th>Department</th>
        <th>Item</th>
        <th>Needed By</th>
        <th>Action</th>
    </tr>
</table>

<h2>Create New User</h2>

<div class="user-form">
    <form id="newUserForm">
        <input type="text" id="newUsername" placeholder="Username" required><br>
        <input type="password" id="newPassword" placeholder="Password" required><br>
        <button class="add-user" type="submit">Add User</button>
    </form>
</div>

<script>
    // Fetch Requests
    fetch('/requests').then(res => res.json()).then(data => {
        const table = document.getElementById("requestsTable");
        data.forEach(req => {
            const row = table.insertRow();
            row.innerHTML = `
                <td>${req.user}</td>
                <td>${req.department}</td>
                <td>${req.item}</td>
                <td>${req.date}</td>
                <td><button class="complete-btn" onclick="completeReq('${req.id}')">Mark Completed</button></td>
            `;
        });
    });

    function completeReq(id) {
        fetch(`/requests/${id}`, { method: "PUT" })
            .then(() => location.reload());
    }

    document.getElementById("newUserForm").addEventListener("submit", (e) => {
        e.preventDefault();
        fetch('/createUser', {
            method: "POST",
            headers: { "Content-Type": "application/json"},
            body: JSON.stringify({
                username: newUsername.value,
                password: newPassword.value
            })
        }).then(() => alert("User Created"));
    });
</script>

</body>
</html>
